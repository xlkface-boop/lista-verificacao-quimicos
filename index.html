<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Verificação Periódica - Área de Químicos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        /* Mantenha aqui o seu estilo original. Adicionei apenas o estilo do logo */
        .logo-img { max-width: 200px; height: auto; display: block; margin: 0 auto; }
        .btn-submit { background: #008751; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; }
        .signature-box { border: 1px solid #ccc; height: 100px; width: 100%; }
    </style>
</head>
<body>

<div id="form-container">
    <table border="1" style="width: 100%; border-collapse: collapse;">
        <tr>
            <td style="width: 25%; text-align: center; padding: 10px;">
                <img src="transpetro_h-RGB.jpg" alt="Logo Transpetro" class="logo-img">
            </td>
            <td style="text-align: center;">
                <h2>LISTA DE VERIFICAÇÃO PERIÓDICA - ÁREA DE QUÍMICOS</h2>
            </td>
        </tr>
        </table>

    <h3>Assinatura Digital</h3>
    <div class="signature-box">
        <canvas id="signature-canvas"></canvas>
    </div>
    <button type="button" onclick="signaturePad.clear()">Limpar Assinatura</button>

    <button type="button" class="btn-submit" id="btn-gerar-pdf">Gerar e Guardar PDF</button>
</div>

<script>
    const canvas = document.getElementById('signature-canvas');
    const signaturePad = new SignaturePad(canvas);

    document.getElementById('btn-gerar-pdf').addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        html2canvas(document.getElementById('form-container')).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save("Lista_Verificacao_T036.pdf");
        });
    });
</script>

</body>
</html>
