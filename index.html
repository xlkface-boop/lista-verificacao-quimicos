<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Verificação Periódica - Área de Químicos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #f4f4f9; color: #000; }
        .container { max-width: 850px; margin: auto; background: white; padding: 15px; box-sizing: border-box; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; }
        
        .watermark-bg { position: absolute; top: 280px; left: 15%; width: 70%; opacity: 0.03; pointer-events: none; z-index: 0; }
        
        .checklist-table { width: 100%; border-collapse: collapse; font-size: 11px; color: #000; position: relative; z-index: 1; background: rgba(255, 255, 255, 0.9); margin-bottom: 10px; }
        .checklist-table th, .checklist-table td { border: 1px solid #000; padding: 6px 8px; vertical-align: middle; }
        
        .section-title { background-color: #008751; color: white; font-weight: bold; text-transform: uppercase; font-size: 11.5px; }
        .header-cell { font-weight: bold; text-align: center; background-color: #f2f2f2; }
        
        .col-item { width: 6%; text-align: center; font-weight: bold; }
        .col-pergunta { width: 44%; } 
        .col-resposta { width: 50%; }

        .logo-img { max-width: 170px; height: auto; display: block; margin: 0 auto; }
        
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 5px; box-sizing: border-box; border: 1px solid #a6a6a6; border-radius: 3px; font-size: 11.5px; font-family: Arial, sans-serif; }
        textarea { resize: none; height: 42px; }
        
        .radio-group { display: flex; gap: 14px; }
        .radio-group label { font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 3px; }
        .checkbox-group label { display: block; margin-bottom: 3px; font-weight: normal; cursor: pointer; }
        .hint { font-size: 9.5px; color: #444; font-style: italic; display: block; margin-top: 2px; font-weight: normal; line-height: 1.2; }
        
        .signature-box { border: 1px dashed #008751; background: #fafafa; width: 100%; height: 80px; box-sizing: border-box; touch-action: none; position: relative; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        
        .btn-clear { background: #ff3333; color: white; border: none; padding: 4px 10px; font-size: 10px; cursor: pointer; border-radius: 3px; font-weight: bold; margin-top: 3px; }
        .btn-submit { background: #008751; color: white; border: none; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; margin-top: 15px; box-shadow: 0 3px 5px rgba(0,0,0,0.15); }
        .btn-submit:hover { background: #006e41; }

        .print-text { display: none; font-weight: normal; }
        .pdf-mode input, .pdf-mode select, .pdf-mode textarea, .pdf-mode .radio-group, .pdf-mode .checkbox-group, .pdf-mode .btn-clear { display: none !important; }
        .pdf-mode .print-text { display: inline-block !important; }
        .pdf-mode .signature-box { border: 1px solid #000 !important; background: transparent !important; }
        .pdf-mode .checklist-table { background: transparent !important; }
        .pdf-mode .watermark-bg { opacity: 0.05 !important; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <input type="text" id="input-responsavel" placeholder="Nome do Responsável">
    
    <p>Conferido por: <span id="display-conferido-por"></span></p>

    <div class="signature-box">
        <canvas id="signature-canvas"></canvas>
    </div>
    <button type="button" class="btn-clear" onclick="signaturePad.clear()">Limpar Assinatura</button>
    <button type="button" class="btn-submit" id="btn-gerar-pdf">Gerar e Guardar PDF</button>
</div>

<script>
    // Inicialização da assinatura
    const canvas = document.getElementById('signature-canvas');
    const signaturePad = new SignaturePad(canvas, {
        penColor: "rgb(0, 0, 0)",
        penWidth: 0.8, 
        minWidth: 0.5,
        maxWidth: 1.5
    });

    // Sincronização em tempo real (Adicionado)
    document.getElementById('input-responsavel').addEventListener('input', function() {
        document.getElementById('display-conferido-por').textContent = this.value;
    });

    // Função de PDF (Mantida original)
    document.getElementById('btn-gerar-pdf').addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById('form-container');
        element.classList.add('pdf-mode');
        html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = 210;
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save("Lista_Verificacao.pdf");
            element.classList.remove('pdf-mode');
        });
    });
</script>
</body>
</html>
